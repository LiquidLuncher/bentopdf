name: Build and Push Docker Images

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    if: github.repository == 'LiquidLuncher/bentopdf' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npm run build

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - run: npm run package

      - uses: softprops/action-gh-release@v2
        with:
          files: dist-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    if: github.repository == 'LiquidLuncher/bentopdf'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        mode:
          - name: default
            simple_mode: false
            suffix: ""
          - name: simple
            simple_mode: true
            suffix: "-simple"

    steps:
      - uses: actions/checkout@v4

      # 🔑 Lowercase repo owner
      - name: Lowercase repo owner
        id: repo_owner
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "version=edge" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push (release)
        if: steps.version.outputs.is_release == 'true'
        uses: docker/build-push-action@v6
        with:
          push: true
          build-args: |
            SIMPLE_MODE=${{ matrix.mode.simple_mode }}
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.lowercase }}/bentopdf${{ matrix.mode.suffix }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo_owner.outputs.lowercase }}/bentopdf${{ matrix.mode.suffix }}:latest
          platforms: linux/amd64

      - name: Build and push (edge)
        if: steps.version.outputs.is_release == 'false'
        uses: docker/build-push-action@v6
        with:
          push: true
          build-args: |
            SIMPLE_MODE=${{ matrix.mode.simple_mode }}
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.lowercase }}/bentopdf${{ matrix.mode.suffix }}:edge
          platforms: linux/amd64
